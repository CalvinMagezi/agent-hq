name: Auto Version Bump

on:
  push:
    branches: [main]
    paths-ignore:
      - 'packages/hq-cli/**'
      - '*.md'
      - '.github/workflows/**'

jobs:
  bump:
    name: Patch bump monorepo version
    runs-on: ubuntu-latest

    # Skip if the last commit was an auto-bump (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[auto-bump]')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in root package.json
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          # Use node to update package.json (preserves formatting better than sed)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Bumped $CURRENT → $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump monorepo to v$NEW_VERSION [auto-bump]"
          git push
